name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  m0-roundtrip:
    runs-on: ubuntu-latest

    env:
      # SDL dummy drivers — no X display or audio device needed on Linux CI.
      # Sufficient per docs/notes/simcoupe-batch.md; xvfb is not required.
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      # Keep SimCoupé config isolated to this run so stale cfg from a previous
      # runner invocation can never leak in (SimCoupe.cfg is written on every
      # clean exit — see simcoupe-batch.md "Known gotchas").
      XDG_CONFIG_HOME: /tmp/simcoupe-cfg

    steps:
      - uses: actions/checkout@v4

      # ── 1. GNU aarch64 binutils ──────────────────────────────────────────
      - name: Install GNU aarch64 binutils
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu
          # Symlink from the cross prefix our scripts expect.
          sudo ln -s /usr/bin/aarch64-linux-gnu-as      /usr/local/bin/aarch64-none-elf-as
          sudo ln -s /usr/bin/aarch64-linux-gnu-objcopy /usr/local/bin/aarch64-none-elf-objcopy

      # ── 2. Patched SimCoupé (built from source) ──────────────────────────
      #
      # Stock apt simcoupe (v1.x) does NOT have the -exitonhalt flag required
      # for deterministic batch exit. We clone upstream at a pinned SHA, apply
      # the vendored patch (tools/simcoupe-exitonhalt.patch), and build.
      #
      # Pinned upstream commit: 0f74cff52b96841fe0efa01ffd1a6875b253e72a
      # ("Updated version to v1.2.15") — parent of the local exit-on-halt branch.
      # Recipe from docs/notes/simcoupe-batch.md "Acquiring the patched SimCoupé in CI".

      - name: Cache patched SimCoupé binary
        id: cache-simcoupe
        uses: actions/cache@v4
        with:
          path: simcoupe-build/build/simcoupe
          # Cache key: patch file content + pinned upstream SHA.
          key: simcoupe-0f74cff52b96841fe0efa01ffd1a6875b253e72a-${{ hashFiles('tools/simcoupe-exitonhalt.patch') }}

      - name: Install SimCoupé build dependencies
        if: steps.cache-simcoupe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential cmake git \
              libsdl2-dev libfmt-dev zlib1g-dev libpng-dev libsamplerate0-dev

      - name: Clone, patch, and build SimCoupé
        if: steps.cache-simcoupe.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/simonowen/simcoupe.git simcoupe-build
          cd simcoupe-build
          git checkout 0f74cff52b96841fe0efa01ffd1a6875b253e72a
          # Verify the patch applies cleanly before actually applying it.
          git apply --check ../tools/simcoupe-exitonhalt.patch
          git apply ../tools/simcoupe-exitonhalt.patch
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          # kosarev/z80 is fetched via CMake FetchContent — network required here.
          cmake --build build -j$(nproc)

      - name: Install SimCoupé onto PATH
        run: |
          sudo cp simcoupe-build/build/simcoupe /usr/local/bin/simcoupe
          sudo chmod +x /usr/local/bin/simcoupe

      # ── 3. Python + pyz80 ────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pyz80
        run: |
          # pyz80 is now a proper Python package (pyproject.toml, src/pyz80/).
          # `pip install` from the cloned repo creates a `pyz80` console-script
          # entry point on PATH, no shebang/wrapper gymnastics needed.
          git clone https://github.com/simonowen/pyz80 /tmp/pyz80
          pip install /tmp/pyz80
          # actions/setup-python@v5 puts pip's bin dir on PATH automatically.
          which pyz80 && pyz80 --help | head -1 || true

      # ── 4. Go + samfile ──────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install samfile
        run: |
          # samfile's module path is `github.com/petemoore/samfile/v2`
          # (Go's /vN semantic import versioning); without the `/v2` suffix
          # `go install` falls back to the pre-v2 release which lacks the
          # `add` subcommand we depend on.
          go install github.com/petemoore/samfile/v2/cmd/samfile@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      # ── 5. Toolchain smoke test ──────────────────────────────────────────
      - name: Verify toolchain
        run: make check

      # ── 6. M0 round-trip oracle ──────────────────────────────────────────
      #
      # SimCoupé needs THREE init subsystems to all succeed before CPU::Run
      # is called (Base/Main.cpp:55):
      #   1. Video — needs a real renderer (SDL dummy has none). xvfb provides
      #      an invisible X display that SDL_VIDEODRIVER=x11 attaches to;
      #      Mesa's llvmpipe satisfies SDL_RENDERER_ACCELERATED. xvfb default
      #      8-bit depth is too shallow → use -screen 0 1280x1024x24.
      #   2. Sound — calls SDL_OpenAudioDevice. ALSA fails with no PCM card 0.
      #      SDL_AUDIODRIVER=dummy gives SDL a no-op audio backend that
      #      always opens successfully — purely environmental, no patch.
      #   3. Input/Frame/CPU/UI — succeed unconditionally on Linux.
      # Diagnosed locally via Docker repro on 2026-05-09; confirmed each
      # subsystem failure short-circuits Main::Init causing silent exit-0.
      - name: Install xvfb and Mesa software GL
        run: sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils

      - name: Round-trip oracle
        env:
          SDL_VIDEODRIVER: x11        # override job-level dummy; need real renderer
          SDL_AUDIODRIVER: dummy      # already set at job level; explicit here
        run: xvfb-run -a -s "-screen 0 1280x1024x24" make ci
