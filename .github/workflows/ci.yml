name: ci

on:
  push:
    branches: [main]
  pull_request:

# Workflow has two jobs:
#
#   build-image: builds the dev image from tools/Dockerfile.dev and pushes
#                it to ghcr.io. Multi-arch (amd64 + arm64) via QEMU. Runs
#                on every push/PR; nothing-changed runs are cheap because
#                the registry-mode buildx cache makes most layers no-ops.
#
#   test:        pulls the image just published by build-image, runs the
#                M0 round-trip oracle inside it.
#
# Both jobs see the same `github.sha`, so the test job can refer to the
# image by `sha-<full-sha>` tag and is guaranteed to find it.

permissions:
  contents: read
  packages: write   # build-image pushes to ghcr.io

env:
  IMAGE_NAME: ghcr.io/petemoore/sam-aarch64-dev

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU emulation lets buildx produce linux/arm64 from this amd64
      # runner. Cost: arm64 simcoupé build runs emulated (~5-10x slower
      # than native), but with the registry cache it's a one-time cost
      # per simcoupé-patch change.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   sha-<full-sha>      — immutable, always set, used by the test job
      #                         to refer to "the image we just built"
      #   latest              — only on the default branch (main)
      #   pr-<N>              — only for PR events
      # The test job uses sha-<full-sha> for reproducibility; consumers
      # locally usually want :latest.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr,prefix=pr-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools
          file: tools/Dockerfile.dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-mode buildx cache: each layer cached as an image
          # blob at the buildcache tag. Cleaner than actions/cache (no
          # size limits, properly de-duplicated across runs). Layers
          # invalidated when their inputs change or any earlier layer
          # changed — Dockerfile.dev orders rarely-changing layers
          # (SimCoupé) before frequently-changing ones (Go/samfile)
          # so the expensive SimCoupé build stays cached through
          # normal development iterations.
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build-image
    container:
      image: ghcr.io/petemoore/sam-aarch64-dev:sha-${{ github.sha }}
      # Same-owner private packages still need credentials for the
      # runner to pull them. If the package is public, this is harmless.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      SDL_VIDEODRIVER: x11
      SDL_AUDIODRIVER: dummy
    steps:
      - uses: actions/checkout@v4

      # Container has everything pre-installed; we just need an X
      # display for SimCoupé. Xvfb is already on PATH via the image's
      # apt step. 24-bit depth is required for Mesa llvmpipe to satisfy
      # SDL_RENDERER_ACCELERATED (default 8-bit is too shallow).
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          # Give the X server a moment to listen.
          sleep 1
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Round-trip oracle
        run: make ci

      # Diagnostic on failure: inspect the disk image. The stub writes
      # `OUT` to disk via HSAVE before its `DI; HALT` exit. If OUT is
      # absent the stub didn't get that far; if its bytes are wrong the
      # stub ran but with wrong UIFA contents. Far higher signal than
      # a screenshot (`import -window root` doesn't capture SDL's
      # window under Xvfb anyway).
      - name: Post-mortem disk inspection
        if: failure()
        run: |
          echo "===== samfile ls ====="
          samfile ls -i build/test.mgt || true
          echo "===== OUT (hex) ====="
          samfile cat -i build/test.mgt -f OUT 2>/dev/null | xxd | head -10 || echo "(OUT not present on disk)"
          echo "===== disk size ====="
          wc -c build/test.mgt

      - name: Upload disk image on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-mgt-on-failure
          path: build/test.mgt
          if-no-files-found: warn
